name: Deploy Nginx with Cortex XDR to GCE

on:
  push:
    branches: [ "main" ]

env:
  GAR_LOCATION: us-central1 
  GAR_REPO: ew-acr     
  # We pull IMAGE_NAME from your Environment Secrets
  
jobs:
  # --- STAGE 1: FETCH CORTEX AGENT ---
  fetch-agent:
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Generate and Download Standalone Installer
        env:
          # Using secrets from your 'Cortex' environment
          XDR_API_URL: ${{ secrets.XDR_API_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          # Remove trailing slash if present to avoid Exit Code 6
          BASE_URL=$(echo $XDR_API_URL | sed 's:/*$::')

          LATEST_VER=$(curl -s -X POST "$BASE_URL/public_api/v1/distributions/get_versions" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -d '{}' \
            | jq -r '.reply.linux[]' | tail -n 1)

          DIST_ID=$(curl -s -X POST "$BASE_URL/public_api/v1/distributions/create" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" \
            -d "{\"request_data\":{\"name\":\"CI-Build-$(date +%s)\",\"package_type\":\"sh\",\"agent_version\":\"$LATEST_VER\",\"platform\":\"linux\"}}" \
            | jq -r '.reply.distribution_id')
          
          echo "Waiting 120s for preparation..." && sleep 120

          DIST_URL=$(curl -s -X POST "$BASE_URL/public_api/v1/distributions/get_dist_url" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" \
            -d "{\"request_data\":{\"distribution_id\":\"$DIST_ID\",\"package_type\":\"sh\"}}" \
            | jq -r '.reply.distribution_url')

          curl -s -L -X POST "$DIST_URL" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -o ./cortex_agent.sh

      - name: Upload Agent for Build
        uses: actions/upload-artifact@v4
        with:
          name: cortex-installer
          path: ./cortex_agent.sh

  # --- STAGE 2: BUILD AND PUSH TO GAR ---
  build-image:
    needs: fetch-agent
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Agent
        uses: actions/download-artifact@v4
        with:
          name: cortex-installer
          path: .

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_KEY }}'

      - name: 'Docker Auth to GAR'
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_NAME }}/${{ env.GAR_REPO }}/${{ secrets.IMAGE_NAME }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_NAME }}/${{ env.GAR_REPO }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}

  # --- STAGE 3: DEPLOY TO GCE ---
  deploy-gcp:
    needs: build-image
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_KEY }}'

      - name: 'Update GCE Container'
        run: |
          # Note: Added fallback for ZONE if not in secrets
          gcloud compute instances update-container "${{ secrets.COMPUTE_NAME }}" \
            --zone "${{ secrets.ZONE || 'us-central1-a' }}" \
            --container-image "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_NAME }}/${{ env.GAR_REPO }}/${{ secrets.IMAGE_NAME }}:latest"
