name: Deploy Nginx with Cortex XDR to GCE (Artifact Registry)

on:
  push:
    branches: [ "main" ]

env:
  # Format: LOCATION-docker.pkg.dev/PROJECT-ID/REPOSITORY/IMAGE
  # Update these values or use secrets
  GAR_LOCATION: ${{ secrets.REGISTRY }}
  IMAGE_NAME: nginx

jobs:
  # --- STAGE 1: FETCH CORTEX AGENT ---
  fetch-agent:
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Generate and Download Standalone Installer
        env:
          XDR_API_URL: ${{ secrets.XDR_API_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          LATEST_VER=$(curl -s -X POST "$XDR_API_URL/public_api/v1/distributions/get_versions" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -d '{}' \
            | jq -r '.reply.linux[]' | tail -n 1)

          DIST_ID=$(curl -s -X POST "$XDR_API_URL/public_api/v1/distributions/create" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" \
            -d "{\"request_data\":{\"name\":\"CI-Build-$(date +%s)\",\"package_type\":\"sh\",\"agent_version\":\"$LATEST_VER\",\"platform\":\"linux\"}}" \
            | jq -r '.reply.distribution_id')
          
          sleep 45

          DIST_URL=$(curl -s -X POST "$XDR_API_URL/public_api/v1/distributions/get_dist_url" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" \
            -d "{\"request_data\":{\"distribution_id\":\"$DIST_ID\",\"package_type\":\"sh\"}}" \
            | jq -r '.reply.distribution_url')

          curl -s -L -X POST "$DIST_URL" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -o ./cortex_agent.sh

      - name: Upload Agent for Build
        uses: actions/upload-artifact@v4
        with:
          name: cortex-installer
          path: ./cortex_agent.sh

  # --- STAGE 2: BUILD AND PUSH TO GCP ARTIFACT REGISTRY ---
  build-image:
    needs: fetch-agent
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Agent
        uses: actions/download-artifact@v4
        with:
          name: cortex-installer
          path: .

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker Auth to Artifact Registry'
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_NAME }}/cortex-repo/${{ env.IMAGE_NAME }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_NAME }}/cortex-repo/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # --- STAGE 3: DEPLOY TO GCE ---
  deploy-gcp:
    needs: build-image
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Update GCE Container'
        run: |
          gcloud compute instances update-container "${{ secrets.COMPUTE_NAME }}" \
            --zone "${{ secrets.ZONE }}" \
            --container-image "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_NAME }}/cortex-repo/${{ env.IMAGE_NAME }}:latest"
