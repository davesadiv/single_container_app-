name: Deploy Nginx with Cortex XDR to GCE (GAR)

on:
  push:
    branches: [ "main" ]

env:
  GAR_LOCATION: us-central1
  GAR_REPO: ew-acr

jobs:
  # --- STAGE 1: HEALTHCHECK ---
  xdr-api-healthcheck:
    runs-on: ubuntu-latest
    environment: Cortex # Accesses secrets from your environment
    steps:
      - name: Verify Cortex XDR API Connectivity
        env:
          XDR_API_URL: ${{ secrets.XDR_API_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          set -e
          # Sanitize URL to prevent DNS resolution errors (Exit Code 6)
          BASE_URL=$(echo $XDR_API_URL | sed 's:/*$::')
          
          echo "Verifying API at $BASE_URL..."
          health_response=$(curl -s "$BASE_URL/public_api/v1/healthcheck" \
            -H "Accept: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN")
          
          STATUS=$(echo "$health_response" | jq -r '.status')
          if [ "$STATUS" != "available" ]; then
            echo "API Unavailable: $STATUS"
            exit 1
          fi
          echo "API is healthy."

  # --- STAGE 2: FETCH CORTEX AGENT ---
  fetch-agent:
    needs: xdr-api-healthcheck
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Generate and Download Standalone Installer
        env:
          XDR_API_URL: ${{ secrets.XDR_API_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          OS_TYPE: "linux"
        run: |
          set -e
          BASE_URL=$(echo $XDR_API_URL | sed 's:/*$::')

          echo "Step 1: Fetch latest agent version"
          agent_versions=$(curl -s -X POST "$BASE_URL/public_api/v1/distributions/get_versions" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" \
            -d '{}')
          
          LATEST_VER=$(echo "$agent_versions" | jq -r ".reply.\"$OS_TYPE\"[]" | tail -n 1)
          echo "Latest Version: $LATEST_VER"

          echo "Step 2: Create distribution (sh)"
          # Requesting 'sh' standalone Linux installer for single host container
          PAYLOAD=$(jq -n --arg run "$GITHUB_RUN_ID" --arg ver "$LATEST_VER" \
            '{request_data: {name: ("GH-Action-" + $run), package_type: "sh", agent_version: $ver, platform: "linux"}}')

          dist_res=$(curl -s -X POST "$BASE_URL/public_api/v1/distributions/create" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" \
            -d "$PAYLOAD")
          
          DIST_ID=$(echo "$dist_res" | jq -r '.reply.distribution_id // empty')
          
          if [ -z "$DIST_ID" ]; then
            echo "Error: Failed to get DIST_ID from response:"
            echo "$dist_res"
            exit 1
          fi

          echo "Waiting 60s for distribution preparation..."
          sleep 60

          echo "Step 3: Download package"
          url_res=$(curl -s -X POST "$BASE_URL/public_api/v1/distributions/get_dist_url" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" \
            -d "{\"request_data\": {\"distribution_id\": \"$DIST_ID\", \"package_type\": \"sh\"}}")
          
          DIST_URL=$(echo "$url_res" | jq -r '.reply.distribution_url')
          curl -s -L -X POST "$DIST_URL" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -o ./cortex_agent.sh

      - name: Upload Agent
        uses: actions/upload-artifact@v4
        with:
          name: cortex-installer
          path: ./cortex_agent.sh
          retention-days: 1

  # --- STAGE 3: BUILD AND PUSH TO GAR ---
  build-image:
    needs: fetch-agent
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - uses: actions/checkout@v4
      - name: Download Agent
        uses: actions/download-artifact@v4
        with:
          name: cortex-installer
          path: .
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_KEY }}' # Accesses GCP_KEY from your environment
      - name: 'Docker Auth to GAR'
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_NAME }}/${{ env.GAR_REPO }}/${{ secrets.IMAGE_NAME }}:latest

  # --- STAGE 4: DEPLOY TO GCE ---
  deploy-gcp:
    needs: build-image
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_KEY }}'
      - name: 'Update GCE Container'
        run: |
          # Deploys image to your single container GCE VM
          gcloud compute instances update-container "${{ secrets.COMPUTE_NAME }}" \
            --zone "us-central1-a" \
            --container-image "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_NAME }}/${{ env.GAR_REPO }}/${{ secrets.IMAGE_NAME }}:latest"
