name: Build and Deploy Nginx

on:
  push:
    branches: [main]

jobs:
  # CALL THE REUSABLE WORKFLOW
  get-agent:
    uses: my-org/shared-workflows/.github/workflows/get-cortex-agent.yml@main
    secrets:
      XDR_API_URL: ${{ secrets.XDR_API_URL }}
      AUTH_ID: ${{ secrets.AUTH_ID }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}

  # BUILD THE APP
  build-and-push:
    needs: get-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Cortex Agent Artifact
        uses: actions/download-artifact@v4
        with:
          name: cortex-installer
          path: .  # Downloads cortex_agent.sh into the build context

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: my-registry/nginx-cortex:latest
